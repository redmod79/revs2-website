site_name: "Revelation's Architecture"
site_description: "A 40-study structural and interpretive analysis of Revelation. 1,368 catalogued items across structural elements and evidence."

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.tabs.link
    - toc.follow
  font:
    text: Roboto
    code: Roboto Mono
  custom_dir: overrides

plugins:
  - search

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social:
    - icon: fontawesome/solid/book-bible
      link: /

extra_javascript:
  - javascripts/verse-popup.js
  - javascripts/study-breadcrumbs.js
  - javascripts/external-links.js

extra_css:
  - stylesheets/extra.css

